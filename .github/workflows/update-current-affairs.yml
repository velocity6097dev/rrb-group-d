name: Update current affairs

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: scripts
        run: |
          npm init -y
          npm install node-fetch@2

      - name: Run update script
        working-directory: scripts
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node update-current-affairs.mjs

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and push changes
        run: |
          if git diff --quiet data/current_affairs.json; then
            echo "No changes to current affairs data"
          else
            git add data/current_affairs.json
            git commit -m "chore: update current affairs [automated]"
            git push
        