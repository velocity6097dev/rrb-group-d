name: Update current affairs

on:
  schedule:
    # Runs at 00:00, 05:00, 10:00, 15:00 and 20:00 UTC — every 5 hours.
    - cron: '0 */5 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab to test it

permissions:
  contents: write

jobs:
  update-current-affairs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run updater
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node update-current-affairs.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name "rrb-prep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/current_affairs.json
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "Auto-update current affairs ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
